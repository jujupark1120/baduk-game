// main.js — DOM 이벤트 와이어링: 캔버스 입력, 버튼, 상태 표시

const $ = (id) => document.getElementById(id);

const canvas = $('board');
const view = new BoardView(canvas);
const ctrl = new GameController();
let hover = null;

// ----- 별명 계정 -----
const PLAYER_SESSION_KEY = 'baduk_player_session_v1';
const PLAYER_RANKS = [
  ...Array.from({ length: 18 }, (_, i) => `${18 - i}급`),
  ...Array.from({ length: 9 }, (_, i) => `아마 ${i + 1}단`),
];
let authMode = 'login';
let playerSession = loadPlayerSession();

function fillRankSelect(select, selected = '18급') {
  select.innerHTML = '';
  for (const rank of PLAYER_RANKS) {
    const option = document.createElement('option');
    option.value = rank;
    option.textContent = rank;
    option.selected = rank === selected;
    select.appendChild(option);
  }
}

// KataGo 서버 연결 전 임시 매핑. UI의 세부 기력은 유지하되 실제 엔진은 3단계다.
function normalizeAILevel(rank) {
  if (rank === 'easy' || rank === 'medium' || rank === 'hard') return rank;
  if (rank.includes('단')) return 'hard';
  const kyu = parseInt(rank, 10);
  if (kyu >= 13) return 'easy';
  if (kyu >= 7) return 'medium';
  return 'hard';
}

function loadPlayerSession() {
  try { return JSON.parse(localStorage.getItem(PLAYER_SESSION_KEY) || 'null'); }
  catch { return null; }
}

function updateAccountButton() {
  $('btn-account').textContent = playerSession ? `${playerSession.nickname} · 로그아웃` : '로그인';
  $('player-rank').hidden = !playerSession;
  if (playerSession) $('player-rank').value = playerSession.rank || '18급';
}

function openAuth() {
  $('auth-message').textContent = '';
  $('auth-overlay').hidden = false;
  setTimeout(() => $('auth-nickname').focus(), 0);
}

function closeAuth() { $('auth-overlay').hidden = true; }

function setAuthMode(mode) {
  authMode = mode;
  $('tab-login').classList.toggle('active', mode === 'login');
  $('tab-register').classList.toggle('active', mode === 'register');
  $('auth-submit').textContent = mode === 'login' ? '로그인' : '아이디 만들기';
  $('auth-pin').autocomplete = mode === 'login' ? 'current-password' : 'new-password';
  $('auth-rank-label').hidden = mode === 'login';
  $('auth-message').textContent = '';
}

async function playerRpc(name, body) {
  const config = window.APP_CONFIG || {};
  if (!config.supabaseUrl || !config.supabasePublishableKey)
    throw new Error('계정 서버 설정이 아직 연결되지 않았습니다.');
  const response = await fetch(`${config.supabaseUrl}/rest/v1/rpc/${name}`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      apikey: config.supabasePublishableKey,
      Authorization: `Bearer ${config.supabasePublishableKey}`,
    },
    body: JSON.stringify(body),
  });
  const data = await response.json().catch(() => ({}));
  if (!response.ok) throw new Error(data.message || '계정 서버에 연결하지 못했습니다.');
  return data;
}

// ----- 온라인 대전 1단계: 방 생성/참가/상태 확인 -----
let onlineRoom = null;
let onlinePollTimer = null;
let onlineRefreshing = false;

function requireOnlineLogin() {
  if (playerSession && playerSession.token) return true;
  openAuth();
  $('online-status').textContent = '온라인 대전은 로그인 후 이용할 수 있습니다.';
  return false;
}

function stopOnlinePolling() {
  if (onlinePollTimer) clearInterval(onlinePollTimer);
  onlinePollTimer = null;
}

function onlineColorName(color) {
  return color === BLACK ? '흑' : color === WHITE ? '백' : '-';
}

function showOnlineState(message = '') {
  const box = $('online-status');
  if (!onlineRoom) {
    box.textContent = message || '로그인 후 방을 만들거나 방 코드로 참가하세요.';
    return;
  }
  const status = onlineRoom.status === 'waiting' ? '상대 기다리는 중' :
    onlineRoom.status === 'playing' ? '대국 준비 완료' : onlineRoom.status;
  box.innerHTML = `<strong>방 코드 ${escapeHtml(onlineRoom.roomCode || '-')}</strong><br>` +
    `내 색: ${onlineColorName(onlineRoom.myColor)} · 상태: ${escapeHtml(status || '-')} · 버전: ${onlineRoom.version ?? '-'}<br>` +
    `${message ? escapeHtml(message) : '현재 단계에서는 방 상태 확인만 가능하며 착수는 비활성화되어 있습니다.'}`;
}

function applyOnlineSnapshot(snapshot) {
  if (!snapshot || !snapshot.game) return;
  onlineRoom = {
    ...onlineRoom,
    gameId: snapshot.game.id,
    roomCode: snapshot.game.room_code,
    myColor: snapshot.my_color,
    status: snapshot.game.status,
    version: snapshot.game.version,
  };
  showOnlineState();
}

async function refreshOnlineSnapshot(silent = false) {
  if (!onlineRoom || !onlineRoom.gameId || !playerSession || onlineRefreshing) return;
  onlineRefreshing = true;
  try {
    const snapshot = await playerRpc('get_game_snapshot', {
      p_token: playerSession.token,
      p_game_id: onlineRoom.gameId,
      p_after_move_no: 0,
    });
    applyOnlineSnapshot(snapshot);
  } catch (error) {
    if (!silent) showOnlineState(error.message);
  } finally {
    onlineRefreshing = false;
  }
}

function startOnlinePolling() {
  stopOnlinePolling();
  onlinePollTimer = setInterval(() => refreshOnlineSnapshot(true), 2000);
}

async function createOnlineGame() {
  if (!requireOnlineLogin()) return;
  const button = $('btn-online-create');
  button.disabled = true;
  $('online-status').textContent = '방을 만드는 중…';
  try {
    const result = await playerRpc('create_game', {
      p_token: playerSession.token,
      p_board_size: 19,
      p_komi: 6.5,
    });
    ctrl.newGame({ mode: 'online', handicap: 0 });
    onlineRoom = {
      gameId: result.game_id,
      roomCode: result.room_code,
      myColor: result.my_color,
      status: result.status,
      version: result.version,
    };
    $('online-room-code').value = result.room_code || '';
    showOnlineState('상대에게 방 코드를 알려주세요.');
    await refreshOnlineSnapshot(true);
    startOnlinePolling();
  } catch (error) {
    onlineRoom = null;
    showOnlineState(error.message);
  } finally {
    button.disabled = false;
  }
}

async function joinOnlineGame() {
  if (!requireOnlineLogin()) return;
  const roomCode = $('online-room-code').value.trim().toUpperCase();
  if (!/^[A-Z0-9]{6}$/.test(roomCode)) {
    $('online-status').textContent = '방 코드 6자리를 입력해 주세요.';
    return;
  }
  const button = $('btn-online-join');
  button.disabled = true;
  $('online-status').textContent = '방에 참가하는 중…';
  try {
    const result = await playerRpc('join_game', {
      p_token: playerSession.token,
      p_room_code: roomCode,
    });
    ctrl.newGame({ mode: 'online', handicap: 0 });
    onlineRoom = {
      gameId: result.game_id,
      roomCode: result.room_code,
      myColor: result.my_color,
      status: result.status,
      version: result.version,
    };
    showOnlineState('방 참가가 완료되었습니다.');
    await refreshOnlineSnapshot(true);
    startOnlinePolling();
  } catch (error) {
    onlineRoom = null;
    showOnlineState(error.message);
  } finally {
    button.disabled = false;
  }
}

function updateModeUI(mode) {
  const online = mode === 'online';
  $('level-row').hidden = mode !== 'ai';
  $('handicap-row').hidden = online;
  $('btn-new').hidden = online;
  $('online-panel').hidden = !online;
  if (!online) stopOnlinePolling();
  else showOnlineState();
}

$('tab-login').addEventListener('click', () => setAuthMode('login'));
$('tab-register').addEventListener('click', () => setAuthMode('register'));
$('auth-guest').addEventListener('click', closeAuth);
$('player-rank').addEventListener('change', async (event) => {
  if (!playerSession) return;
  const previous = playerSession.rank;
  const next = event.target.value;
  event.target.disabled = true;
  try {
    const result = await playerRpc('update_player_rank', {
      p_token: playerSession.token,
      p_rank: next,
    });
    playerSession.rank = result.rank;
    localStorage.setItem(PLAYER_SESSION_KEY, JSON.stringify(playerSession));
    updateAccountButton();
  } catch (error) {
    event.target.value = previous;
    alert(error.message);
  } finally {
    event.target.disabled = false;
  }
});
$('btn-account').addEventListener('click', () => {
  if (!playerSession) { openAuth(); return; }
  if (confirm(`${playerSession.nickname} 아이디에서 로그아웃할까요?`)) {
    localStorage.removeItem(PLAYER_SESSION_KEY);
    playerSession = null;
    updateAccountButton();
    openAuth();
  }
});
$('auth-form').addEventListener('submit', async (event) => {
  event.preventDefault();
  const nickname = $('auth-nickname').value.trim();
  const pin = $('auth-pin').value;
  const submit = $('auth-submit');
  const message = $('auth-message');
  submit.disabled = true;
  message.textContent = '연결 중…';
  try {
    const fn = authMode === 'login' ? 'login_player' : 'register_player';
    const body = { p_nickname: nickname, p_pin: pin };
    playerSession = await playerRpc(fn, body);
    if (authMode === 'register') {
      const selectedRank = $('auth-rank').value;
      if (playerSession && playerSession.token) {
        try {
          const rankResult = await playerRpc('update_player_rank', {
            p_token: playerSession.token,
            p_rank: selectedRank,
          });
          playerSession.rank = rankResult.rank;
        } catch (rankError) {
          alert('아이디는 만들어졌지만 급수 저장에 실패했습니다. 로그인 후 상단에서 급수를 다시 선택해 주세요.');
        }
      } else {
        alert('아이디는 만들어졌지만 급수를 바로 저장하지 못했습니다. 로그인 후 상단에서 급수를 선택해 주세요.');
      }
    }
    localStorage.setItem(PLAYER_SESSION_KEY, JSON.stringify(playerSession));
    $('auth-pin').value = '';
    updateAccountButton();
    closeAuth();
  } catch (error) {
    message.textContent = error.message;
  } finally {
    submit.disabled = false;
  }
});

// ----- 렌더 -----
function render() { view.draw(ctrl.game, hover, ctrl.reviewMode); }
function relayout() { view.layout(19); render(); }

ctrl.onChange = (st) => { updateStatus(st); render(); };

function scoreSummary(score, final = false) {
  const winner = score.winner === BLACK ? '흑' : '백';
  const outcome = final
    ? `최종 승패 · ${winner} ${score.margin}집 승`
    : `현재 예상 · ${winner} ${score.margin}집 우세`;
  return `<div class="score-grid">` +
    `<div class="score-card"><strong>흑 ${score.blackTotal}집</strong>` +
    `<span>영역 ${score.blackTerritory}집<br>잡은 돌 ${score.blackCaptures}개</span></div>` +
    `<div class="score-card"><strong>백 ${score.whiteTotal}집</strong>` +
    `<span>영역 ${score.whiteTerritory}집<br>잡은 돌 ${score.whiteCaptures}개 · 덤 ${score.komi}집</span></div>` +
    `</div><div class="score-neutral">중립 ${score.neutral}집</div>` +
    `<div class="score-outcome">${outcome}</div>`;
}

function updateStatus(st) {
  const dot = $('turn-dot');
  const txt = $('turn-text');
  dot.className = 'dot ' + (st.turn === BLACK ? 'black' : 'white');

  if (st.mode === 'online') {
    txt.textContent = '온라인 대전 · 방 연결 및 상태 확인 단계';
  } else if (st.thinking) {
    txt.textContent = 'AI가 다음 수를 생각하고 있습니다';
  } else if (st.scoringMode) {
    txt.textContent = '계가 모드 · 사석을 확인해 주세요';
  } else if (st.ended) {
    txt.textContent = '대국이 종료되었습니다';
  } else if (st.reviewMode) {
    txt.textContent = '복기 모드';
  } else {
    txt.textContent = st.turn === BLACK ? '● 흑 차례입니다' : '○ 백 차례입니다';
  }

  $('move-no').textContent = st.moveNumber;
  $('cap-black').textContent = st.captures[BLACK];
  $('cap-white').textContent = st.captures[2];

  // 결과
  const resBox = $('result');
  if (st.ended && st.result) {
    let msg = '';
    if (st.result.type === 'resign') {
      const winner = st.result.winner === BLACK ? '흑' : '백';
      msg = `<div class="score-outcome">최종 승패 · ${winner} 불계승</div>`;
    } else if (st.result.type === 'scoring') {
      msg = `<div class="score-guide"><strong>사석을 확인해 주세요</strong>` +
        `먼저 ‘사석 후보 자동 선택’을 누른 뒤, 잘못 선택된 돌 그룹은 바둑판에서 직접 눌러 수정할 수 있습니다.</div>` +
        scoreSummary(st.score);
    } else if (st.result.type === 'score') {
      msg = scoreSummary(st.score, true);
    }
    resBox.innerHTML = msg;
    resBox.hidden = false;
  } else if (st.mode === 'local' && st.passes === 1) {
    const passer = st.turn === BLACK ? '백' : '흑';
    const next = st.turn === BLACK ? '흑' : '백';
    resBox.innerHTML = `<div class="local-pass-notice">${passer}이 패스했습니다. ` +
      `${next}도 패스하면 계가 모드로 들어갑니다.</div>`;
    resBox.hidden = false;
  } else {
    resBox.hidden = true;
  }

  const showEndActions = st.ended && st.result && st.result.type === 'score';
  const endActions = $('end-actions');
  endActions.hidden = !showEndActions;
  endActions.style.display = showEndActions ? 'grid' : 'none';

  // 진행 버튼 활성/비활성
  const inReview = st.reviewMode;
  const online = st.mode === 'online';
  $('btn-pass').disabled = online || inReview || st.thinking || st.awaitingPassChoice || st.ended;
  $('btn-undo').disabled = online || inReview || st.thinking || st.awaitingPassChoice || st.ended || st.moveNumber === 0;
  $('btn-resign').disabled = online || inReview || st.ended;
  const passChoice = $('pass-choice');
  passChoice.hidden = !st.awaitingPassChoice;
  passChoice.style.display = st.awaitingPassChoice ? 'grid' : 'none';
  const scoringActions = $('scoring-actions');
  scoringActions.hidden = !st.scoringMode;
  scoringActions.style.display = st.scoringMode ? 'grid' : 'none';

  // 복기 컨트롤
  const rev = $('review-controls');
  rev.hidden = !inReview;
  if (inReview) {
    $('rev-label').textContent = `${st.reviewIndex} / ${st.reviewTotal}`;
  }
}

// ----- 캔버스 입력 -----
canvas.addEventListener('mousemove', (e) => {
  const g = view.pixelToGrid(e.clientX, e.clientY);
  if ((g && (!hover || g.x !== hover.x || g.y !== hover.y)) || (!g && hover)) {
    hover = g; render();
  }
});
canvas.addEventListener('mouseleave', () => { hover = null; render(); });
canvas.addEventListener('click', (e) => {
  const g = view.pixelToGrid(e.clientX, e.clientY);
  if (g) ctrl.humanPlay(g.x, g.y);
});
canvas.addEventListener('touchend', (e) => {
  if (e.cancelable) e.preventDefault();
  const t = e.changedTouches[0];
  if (!t) return;
  const g = view.pixelToGrid(t.clientX, t.clientY);
  if (g) ctrl.humanPlay(g.x, g.y);
  hover = null;
  render();
}, { passive: false });

// ----- 진행 버튼 -----
$('btn-pass').addEventListener('click', () => ctrl.pass());
$('btn-pass-score').addEventListener('click', () => ctrl.confirmPassScoring());
$('btn-pass-continue').addEventListener('click', () => ctrl.continueAfterPass());
$('btn-undo').addEventListener('click', () => ctrl.undo());
$('btn-resign').addEventListener('click', () => {
  if (confirm('기권하시겠습니까?')) ctrl.resign();
});
$('btn-auto-dead').addEventListener('click', () => ctrl.autoSelectDeadStones());
$('btn-score-confirm').addEventListener('click', () => {
  if (confirm('선택한 사석과 현재 점수로 계가를 확정할까요?')) ctrl.confirmScore();
});
$('btn-auto-dead').addEventListener('click', () => ctrl.autoSelectDeadStones());
$('btn-score-cancel').addEventListener('click', () => ctrl.cancelScoring());

// ----- 대국 종료 후 이동 -----
$('btn-rematch').addEventListener('click', () => {
  const mode = ctrl.mode;
  const aiLevel = ctrl.aiLevel;
  const handicap = ctrl.game.handicap || 0;
  $('sel-mode').value = mode;
  $('level-row').hidden = mode !== 'ai';

});
$('btn-main').addEventListener('click', () => {
  const card = $('newgame-card');
  card.scrollIntoView({ behavior: 'smooth', block: 'center' });

});

// ----- 새 대국 -----
$('sel-mode').addEventListener('change', (e) => {
  const mode = e.target.value;
  updateModeUI(mode);
  if (mode === 'online' || ctrl.mode === 'online') {
    ctrl.newGame({
      mode,
      aiLevel: $('sel-level').value,
      handicap: mode === 'online' ? 0 : (parseInt($('sel-handicap').value, 10) || 0),
    });
  }
});
$('btn-new').addEventListener('click', () => {
  ctrl.newGame({
    mode: $('sel-mode').value,
    aiLevel: $('sel-level').value,
    handicap: parseInt($('sel-handicap').value, 10) || 0,
  });
});
$('btn-online-create').addEventListener('click', createOnlineGame);
$('btn-online-join').addEventListener('click', joinOnlineGame);
$('btn-online-refresh').addEventListener('click', () => refreshOnlineSnapshot(false));
$('online-room-code').addEventListener('input', (event) => {
  event.target.value = event.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 6);
});
$('online-room-code').addEventListener('keydown', (event) => {
  if (event.key === 'Enter') joinOnlineGame();
});

// ----- 기보 -----
function nowStr() {
  const d = new Date();
  const p = (n) => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function currentMeta() {
  return {
    date: nowStr(),
    handicap: ctrl.game.handicap,
    pb: '흑',
    pw: ctrl.mode === 'ai' ? `AI(${$('sel-level').value})` : '백',
  };
}

$('btn-save').addEventListener('click', () => {
  if (ctrl.game.moves.length === 0) { alert('저장할 수순이 없습니다.'); return; }
  const name = prompt('기보 이름', `대국 ${nowStr()}`);
  if (name === null) return;
  saveKifu(name, ctrl.game, currentMeta());
  renderSavedList();
});

$('btn-sgf').addEventListener('click', () => {
  if (ctrl.game.moves.length === 0) { alert('내보낼 수순이 없습니다.'); return; }
  const sgf = movesToSGF(ctrl.game.moves, ctrl.game.size, currentMeta());
  download(`baduk-${Date.now()}.sgf`, sgf, 'application/x-go-sgf');
});

$('btn-json').addEventListener('click', () => {
  if (ctrl.game.moves.length === 0) { alert('내보낼 수순이 없습니다.'); return; }
  const json = gameToJSON(ctrl.game, currentMeta());
  download(`baduk-${Date.now()}.json`, json, 'application/json');
});

// 복기 네비게이션
document.querySelectorAll('[data-rev]').forEach((btn) => {
  btn.addEventListener('click', () => ctrl.reviewStep(btn.dataset.rev));
});
$('btn-continue').addEventListener('click', () => ctrl.continueFromReview());

// 저장된 기보 목록
function renderSavedList() {
  const ul = $('saved-list');
  const list = listSaved();
  ul.innerHTML = '';
  if (list.length === 0) {
    const li = document.createElement('li');
    li.className = 'empty';
    li.textContent = '저장된 기보가 없습니다.';
    ul.appendChild(li);
    return;
  }
  list.forEach((kifu, idx) => {
    const li = document.createElement('li');

    const info = document.createElement('div');
    info.className = 'name';
    const cnt = (kifu.moves || []).length;
    info.innerHTML = `<div>${escapeHtml(kifu.name)}</div>` +
      `<div class="sub2">${cnt}수${kifu.handicap ? ` · ${kifu.handicap}점` : ''}` +
      `${kifu.meta && kifu.meta.date ? ` · ${escapeHtml(kifu.meta.date)}` : ''}</div>`;

    const loadBtn = document.createElement('button');
    loadBtn.textContent = '복기';
    loadBtn.addEventListener('click', () => ctrl.loadKifu(kifu));

    const delBtn = document.createElement('button');
    delBtn.textContent = '삭제';
    delBtn.className = 'danger';
    delBtn.addEventListener('click', () => {
      if (confirm(`"${kifu.name}" 기보를 삭제할까요?`)) { deleteKifu(idx); renderSavedList(); }
    });

    li.append(info, loadBtn, delBtn);
    ul.appendChild(li);
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
  ));
}

// ----- 초기화 -----
function init() {
  fillRankSelect($('auth-rank'));
  fillRankSelect($('player-rank'));
  fillRankSelect($('sel-level'), '1급');
  relayout();
  ctrl.newGame({ mode: 'local', handicap: 0 });
  updateModeUI('local');
  renderSavedList();
  updateAccountButton();
  if (!playerSession) openAuth();
}
window.addEventListener('resize', relayout);
window.addEventListener('orientationchange', () => setTimeout(relayout, 200));
init();

</script>
