<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>바둑 — 기원 온라인</title>
  <style>
:root {
  --bg: #1f2430;
  --panel: #2a3140;
  --card: #323b4d;
  --line: #3f4a5e;
  --text: #e7ecf3;
  --muted: #9aa6b8;
  --accent: #5b9bff;
  --danger: #e0586b;
  --board: #e9b969;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
  -webkit-text-size-adjust: 100%;
}

.app {
  max-width: 1240px;
  margin: 0 auto;
  padding: 16px;
}

.topbar h1 {
  margin: 0;
  font-size: 28px;
  letter-spacing: 1px;
}
.topline { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.account-btn { padding: 7px 11px; font-size: 13px; }
.account-area { display: flex; align-items: center; gap: 8px; }
.player-rank { min-width: 92px; padding: 7px 8px; }
.player-rank[hidden] { display: none; }
.auth-overlay {
  position: fixed; inset: 0; z-index: 50; display: grid; place-items: center;
  padding: 18px; background: rgba(10, 14, 22, 0.78);
}
.auth-overlay[hidden] { display: none; }
.auth-card { width: min(380px, 100%); background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 20px; }
.auth-card h2 { margin: 0 0 6px; }
.auth-card .hint { margin: 0 0 16px; color: var(--muted); font-size: 13px; }
.auth-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.auth-tabs button.active { background: var(--accent); color: #06122b; font-weight: 700; }
.auth-card label { display: block; margin: 10px 0; color: var(--muted); font-size: 13px; }
.auth-card input { width: 100%; margin-top: 5px; padding: 10px; color: var(--text); background: #1f2734; border: 1px solid var(--line); border-radius: 8px; font: inherit; }
.auth-submit { width: 100%; margin-top: 6px; }
.auth-guest { width: 100%; margin-top: 8px; background: transparent; }
.auth-message { min-height: 20px; margin: 10px 0 0; font-size: 13px; color: #ffb3bd; }
.topbar .rom {
  font-size: 14px;
  color: var(--muted);
  font-weight: 400;
}
.topbar .sub {
  margin: 2px 0 14px;
  color: var(--muted);
  font-size: 13px;
}

.layout {
  display: flex;
  gap: 18px;
  align-items: flex-start;
}

.board-wrap {
  flex: 1 1 auto;
  max-width: 760px;
  aspect-ratio: 1 / 1;
  width: 100%;
  background: var(--board);
  border-radius: 8px;
  box-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
  overflow: hidden;
}
#board {
  display: block;
  width: 100%;
  height: 100%;
  touch-action: manipulation;
  cursor: pointer;
}

.panel {
  flex: 0 0 300px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 12px 14px;
}
.card h2 {
  margin: 0 0 10px;
  font-size: 15px;
}
.card h3 {
  margin: 12px 0 6px;
  font-size: 13px;
  color: var(--muted);
}

/* 상태 */
.status .turn {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 18px;
  font-weight: 600;
}
.dot {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  display: inline-block;
  border: 1px solid #0006;
}
.dot.black { background: radial-gradient(circle at 35% 35%, #6a6a6a, #000); }
.dot.white { background: radial-gradient(circle at 35% 35%, #fff, #b9b9b9); }
.status .meta {
  display: flex;
  flex-wrap: wrap;
  gap: 10px 14px;
  margin-top: 10px;
  font-size: 13px;
  color: var(--muted);
}
.status .meta b { color: var(--text); }
.result {
  margin-top: 10px;
  padding: 14px;
  background: #1c2230;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--text);
}
.score-guide { margin-bottom: 12px; color: var(--muted); font-size: 13px; line-height: 1.55; }
.score-guide strong { display: block; margin-bottom: 3px; color: #ffd479; font-size: 15px; }
.score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.score-card { padding: 10px; border-radius: 8px; background: #252e3d; }
.score-card strong { display: block; margin-bottom: 4px; font-size: 16px; }
.score-card span { color: var(--muted); font-size: 12px; line-height: 1.45; }
.score-outcome { margin-top: 10px; padding: 10px; border-radius: 8px; background: rgba(255, 212, 121, 0.12); color: #ffd479; font-size: 16px; font-weight: 800; text-align: center; }
.score-neutral { margin-top: 8px; color: var(--muted); font-size: 12px; text-align: center; }
.scoring-actions { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 10px; }
.scoring-actions[hidden] { display: none; }
.scoring-actions button { padding: 9px 10px; font-size: 13px; }
.scoring-actions #btn-score-confirm { padding: 12px; font-size: 15px; }
.scoring-actions #btn-score-cancel { background: transparent; }
.pass-choice { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; padding: 10px; background: #1c2230; border-radius: 8px; }
.pass-choice[hidden] { display: none; }
.pass-choice p { grid-column: 1 / -1; margin: 0; color: #ffd479; font-weight: 600; }
.pass-choice button { padding: 7px 8px; font-size: 12px; }
.local-pass-notice { color: #ffd479; font-size: 13px; font-weight: 700; line-height: 1.5; }
.end-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
.end-actions[hidden] { display: none; }
.end-actions button { padding: 9px 8px; font-size: 12px; }

/* 버튼 */
button {
  font: inherit;
  color: var(--text);
  background: #3c485e;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 9px 12px;
  cursor: pointer;
  transition: background 0.12s ease;
}
button:hover { background: #46546d; }
button:active { transform: translateY(1px); }
button:disabled { opacity: 0.45; cursor: not-allowed; }
button.primary { background: var(--accent); border-color: var(--accent); color: #06122b; font-weight: 700; }
button.primary:hover { filter: brightness(1.05); }
button.danger { background: transparent; border-color: var(--danger); color: var(--danger); }
button.danger:hover { background: rgba(224, 88, 107, 0.12); }

.actions {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}

/* 새 대국 폼 */
.row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
  font-size: 14px;
}
.row span { color: var(--muted); }
select {
  font: inherit;
  color: var(--text);
  background: #1f2734;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 7px 9px;
  min-width: 150px;
}
.newgame .primary { width: 100%; margin-top: 2px; }
.online-panel { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); }
.online-panel[hidden] { display: none; }
.online-actions { display: grid; gap: 8px; }
.online-join { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
.online-join input { min-width: 0; text-transform: uppercase; }
.online-status { margin-top: 10px; padding: 10px; border-radius: 8px; background: #1c2230; color: var(--muted); font-size: 13px; line-height: 1.55; }
.online-status strong { color: #ffd479; }

/* 기보 */
.kifu-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.kifu-buttons button { flex: 1 1 auto; font-size: 13px; padding: 8px 8px; }

.review {
  margin-top: 12px;
  padding: 10px;
  background: #1c2230;
  border-radius: 8px;
}
.rev-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-bottom: 8px;
}
.rev-nav button { padding: 6px 10px; }
.rev-nav span { min-width: 70px; text-align: center; font-size: 13px; color: var(--muted); }
.review #btn-continue { width: 100%; }

.saved-list {
  list-style: none;
  margin: 0;
  padding: 0;
  max-height: 220px;
  overflow-y: auto;
}
.saved-list li {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 8px;
  border: 1px solid var(--line);
  border-radius: 8px;
  margin-bottom: 6px;
  font-size: 13px;
  background: #29313f;
}
.saved-list .name { flex: 1 1 auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.saved-list .sub2 { color: var(--muted); font-size: 11px; }
.saved-list button { padding: 5px 8px; font-size: 12px; }
.saved-list .empty { color: var(--muted); border: none; background: none; padding: 4px 0; }

.foot {
  margin-top: 16px;
  color: var(--muted);
  font-size: 12px;
  text-align: center;
}

/* 모바일: 세로 스택 */
@media (max-width: 820px) {
  .app { width: 100%; padding: 10px; overflow-x: hidden; }
  .topline { align-items: flex-start; }
  .topbar h1 { font-size: 24px; }
  .topbar .sub { margin-bottom: 10px; }
  .account-area { min-width: 0; flex-wrap: wrap; justify-content: flex-end; }
  .player-rank { min-width: 88px; max-width: 120px; }

  .layout { min-width: 0; flex-direction: column; gap: 12px; }
  .board-wrap {
    flex: none;
    width: 100%;
    max-width: calc(100vw - 20px);
    align-self: center;
    border-radius: 6px;
  }
  .panel { min-width: 0; flex-basis: auto; width: 100%; gap: 10px; }
  .card { padding: 14px; }

  button { min-height: 46px; padding: 11px 13px; }
  .account-btn { min-height: 42px; padding: 9px 11px; }
  .actions { gap: 10px; }
  .actions button { min-height: 50px; font-size: 15px; font-weight: 700; }

  .status .turn { gap: 9px; font-size: 19px; line-height: 1.4; }
  .status .meta { gap: 8px 14px; font-size: 14px; }
  .result { padding: 13px; }
  .local-pass-notice,
  .score-guide { font-size: 14px; line-height: 1.65; }
  .score-guide strong { font-size: 16px; }
  .score-card { padding: 12px; }
  .score-card strong { font-size: 17px; }
  .score-card span { font-size: 13px; line-height: 1.55; }
  .score-outcome { padding: 12px 10px; font-size: 17px; line-height: 1.45; }

  .pass-choice { gap: 10px; padding: 12px; }
  .pass-choice p { font-size: 14px; line-height: 1.55; }
  .pass-choice button { min-height: 48px; padding: 10px; font-size: 14px; }
  .scoring-actions { gap: 10px; margin-top: 12px; }
  .scoring-actions button,
  .scoring-actions #btn-score-confirm { min-height: 50px; padding: 12px; font-size: 15px; }
  .end-actions { gap: 10px; margin-top: 12px; }
  .end-actions button { min-height: 50px; padding: 11px 9px; font-size: 14px; }

  .row { min-height: 44px; }
  select { min-height: 44px; }
  .kifu-buttons button,
  .saved-list button,
  .rev-nav button { min-height: 44px; }
}

@media (max-width: 480px) {
  .score-grid { grid-template-columns: 1fr; gap: 10px; }
  .end-actions { grid-template-columns: 1fr; }
  .pass-choice { grid-template-columns: 1fr; }
  .pass-choice p { grid-column: 1; }
  .row { align-items: stretch; flex-direction: column; gap: 6px; }
  select { width: 100%; min-width: 0; }
}

</style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topline">
        <h1>바둑 <span class="rom">Baduk</span></h1>
        <div class="account-area">
          <select id="player-rank" class="player-rank" aria-label="내 급수" hidden></select>
          <button id="btn-account" class="account-btn">로그인</button>
        </div>
      </div>
      <p class="sub">기원 온라인 · 1단계 — 로컬 &amp; AI 대전</p>
    </header>

    <main class="layout">
      <section class="board-wrap">
        <canvas id="board"></canvas>
      </section>

      <aside class="panel">
        <!-- 상태 -->
        <div class="card status">
          <div class="turn">
            <span id="turn-dot" class="dot black"></span>
            <span id="turn-text">흑 차례</span>
          </div>
          <div class="meta">
            <span>수순 <b id="move-no">0</b></span>
            <span>흑 따냄 <b id="cap-black">0</b></span>
            <span>백 따냄 <b id="cap-white">0</b></span>
          </div>
          <div id="result" class="result" hidden></div>
          <div id="end-actions" class="end-actions" hidden>
            <button id="btn-rematch" class="primary">같은 모드로 다시하기</button>
            <button id="btn-main">메인으로 돌아가기</button>
          </div>
          <div id="pass-choice" class="pass-choice" hidden>
            <p>패스했습니다. 계가로 들어갈까요?</p>
            <button id="btn-pass-score" class="primary">계가하기</button>
            <button id="btn-pass-continue">계속두기</button>
          </div>
          <div id="scoring-actions" class="scoring-actions" hidden>
            <button id="btn-auto-dead">사석 후보 자동 선택</button>
            <button id="btn-score-confirm" class="primary">이 점수로 계가 확정하기</button>
            <button id="btn-score-cancel">대국으로 돌아가기</button>
          </div>
        </div>

        <!-- 진행 버튼 -->
        <div class="card actions">
          <button id="btn-pass">패스</button>
          <button id="btn-undo">무르기</button>
          <button id="btn-resign" class="danger">기권</button>
        </div>

        <!-- 새 대국 -->
        <div id="newgame-card" class="card newgame">
          <h2>새 대국</h2>
          <label class="row">
            <span>모드</span>
            <select id="sel-mode">
              <option value="local">2인 로컬</option>
              <option value="ai">AI 대전</option>
              <option value="online">온라인 대전</option>
            </select>
          </label>
          <label class="row" id="level-row" hidden>
            <span>AI 급수 (임시)</span>
            <select id="sel-level" aria-label="AI 기력"></select>
          </label>
          <label class="row" id="handicap-row">
            <span>치수</span>
            <select id="sel-handicap">
              <option value="0">호선 (0)</option>
              <option value="2">2점</option>
              <option value="3">3점</option>
              <option value="4">4점</option>
              <option value="5">5점</option>
              <option value="6">6점</option>
              <option value="7">7점</option>
              <option value="8">8점</option>
              <option value="9">9점</option>
            </select>
          </label>
          <button id="btn-new" class="primary">새 대국 시작</button>
          <div id="online-panel" class="online-panel" hidden>
            <div class="online-actions">
              <button id="btn-online-create" class="primary">방 만들기</button>
              <div class="online-join">
                <input id="online-room-code" maxlength="6" autocomplete="off" placeholder="방 코드 6자리" aria-label="온라인 대전 방 코드" />
                <button id="btn-online-join">참가하기</button>
              </div>
              <button id="btn-online-refresh">방 상태 새로고침</button>
            </div>
            <div id="online-status" class="online-status">로그인 후 방을 만들거나 방 코드로 참가하세요.</div>
          </div>
        </div>

        <!-- 기보 -->
        <div class="card kifu">
          <h2>기보</h2>
          <div class="kifu-buttons">
            <button id="btn-save">현재 기보 저장</button>
            <button id="btn-sgf">SGF 내보내기</button>
            <button id="btn-json">JSON 내보내기</button>
          </div>

          <div id="review-controls" class="review" hidden>
            <div class="rev-nav">
              <button data-rev="first" title="처음">⏮</button>
              <button data-rev="prev" title="이전">◀</button>
              <span id="rev-label">0 / 0</span>
              <button data-rev="next" title="다음">▶</button>
              <button data-rev="last" title="끝">⏭</button>
            </div>
            <button id="btn-continue">이 위치부터 두기</button>
          </div>

          <h3>저장된 기보</h3>
          <ul id="saved-list" class="saved-list"></ul>
        </div>
      </aside>
    </main>

    <footer class="foot">
      <span>2단계(온라인·관전) / 3단계(계정·급수·서버 기보)는 로드맵입니다.</span>
    </footer>
  </div>

  <div id="auth-overlay" class="auth-overlay" hidden>
    <section class="auth-card" aria-modal="true" role="dialog" aria-labelledby="auth-title">
      <h2 id="auth-title">내 바둑 아이디</h2>
      <p class="hint">별명과 숫자 4자리 PIN으로 접속하세요.</p>
      <div class="auth-tabs">
        <button id="tab-login" class="active">로그인</button>
        <button id="tab-register">새 아이디</button>
      </div>
      <form id="auth-form">
        <label>별명
          <input id="auth-nickname" maxlength="12" autocomplete="username" placeholder="한글·영문·숫자 2~12자" required />
        </label>
        <label>PIN
          <input id="auth-pin" type="password" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" autocomplete="current-password" placeholder="숫자 4자리" required />
        </label>
        <label id="auth-rank-label">본인 급수
          <select id="auth-rank"></select>
        </label>
        <button id="auth-submit" class="primary auth-submit" type="submit">로그인</button>
        <button id="auth-guest" class="auth-guest" type="button">게스트로 시작</button>
        <p id="auth-message" class="auth-message" role="alert"></p>
      </form>
    </section>
  </div>

  <script src="config.js"></script>
  <script>
/* ===== js/rules.js ===== */
// rules.js — 바둑 규칙 엔진 (순수 로직, UI/렌더링과 분리)
// 보드 값: 0 = 빈 점, 1 = 흑, 2 = 백

const EMPTY = 0;
const BLACK = 1;
const WHITE = 2;

function opponent(color) {
  return color === BLACK ? WHITE : BLACK;
}

// 19x19 표준 치석(접바둑) 위치. (x, y) 좌표는 y가 위에서 아래로 0..18.
// 화점은 3, 9, 15 라인.
const HANDICAP_19 = {
  2: [[15, 3], [3, 15]],
  3: [[15, 3], [3, 15], [15, 15]],
  4: [[3, 3], [15, 3], [3, 15], [15, 15]],
  5: [[3, 3], [15, 3], [3, 15], [15, 15], [9, 9]],
  6: [[3, 3], [15, 3], [3, 15], [15, 15], [3, 9], [15, 9]],
  7: [[3, 3], [15, 3], [3, 15], [15, 15], [3, 9], [15, 9], [9, 9]],
  8: [[3, 3], [15, 3], [3, 15], [15, 15], [3, 9], [15, 9], [9, 3], [9, 15]],
  9: [[3, 3], [15, 3], [3, 15], [15, 15], [3, 9], [15, 9], [9, 3], [9, 15], [9, 9]],
};

class GoGame {
  constructor(size = 19) {
    this.size = size;
    this.reset();
  }

  reset() {
    const n = this.size;
    this.board = Array.from({ length: n }, () => new Array(n).fill(EMPTY));
    this.turn = BLACK;
    // captures[c] = c색이 따낸(잡은) 상대 돌 수
    this.captures = { [BLACK]: 0, [WHITE]: 0 };
    this.koPoint = null;       // 패: 이 자리에는 다음 수로 둘 수 없음 {x,y}
    this.lastMove = null;      // {x,y,color}
    this.passes = 0;           // 연속 패스 횟수
    this.ended = false;
    this.result = null;
    this.moveNumber = 0;
    this.moves = [];           // 기보(수순): {color,x,y} 또는 {color,pass:true}
    this.history = [];         // 무르기용 델타 스택
    this.handicap = 0;
    this.deadStones = new Set(); // 계가 때 사용자가 선택한 사석
  }

  // 빈 보드 상태에서 호출. h는 2..9.
  setupHandicap(h) {
    const pts = HANDICAP_19[h];
    if (!pts) return;
    for (const [x, y] of pts) this.board[y][x] = BLACK;
    this.handicap = h;
    this.turn = WHITE; // 접바둑은 백이 먼저 둔다
  }

  inBounds(x, y) {
    return x >= 0 && y >= 0 && x < this.size && y < this.size;
  }

  neighbors(x, y) {
    const out = [];
    if (x > 0) out.push([x - 1, y]);
    if (x < this.size - 1) out.push([x + 1, y]);
    if (y > 0) out.push([x, y - 1]);
    if (y < this.size - 1) out.push([x, y + 1]);
    return out;
  }

  // 연결된 돌 그룹과 활로 수를 flood-fill로 계산.
  // 반환: { stones: [[x,y]...], liberties: number }
  groupInfo(x, y) {
    const color = this.board[y][x];
    const stones = [];
    const libSet = new Set();
    const seen = new Set();
    const stack = [[x, y]];
    seen.add(y * this.size + x);
    while (stack.length) {
      const [cx, cy] = stack.pop();
      stones.push([cx, cy]);
      for (const [nx, ny] of this.neighbors(cx, cy)) {
        const v = this.board[ny][nx];
        if (v === EMPTY) {
          libSet.add(ny * this.size + nx);
        } else if (v === color) {
          const k = ny * this.size + nx;
          if (!seen.has(k)) { seen.add(k); stack.push([nx, ny]); }
        }
      }
    }
    return { stones, liberties: libSet.size };
  }

  // 착수 합법성 + 따냄 결과를 "상태를 바꾸지 않고" 검사.
  // 반환: { legal, reason, captured: [[x,y]...] }
  probe(x, y, color) {
    if (this.ended) return { legal: false, reason: 'ended', captured: [] };
    if (!this.inBounds(x, y)) return { legal: false, reason: 'bounds', captured: [] };
    if (this.board[y][x] !== EMPTY) return { legal: false, reason: 'occupied', captured: [] };
    if (this.koPoint && this.koPoint.x === x && this.koPoint.y === y)
      return { legal: false, reason: 'ko', captured: [] };

    const opp = opponent(color);
    this.board[y][x] = color; // 임시 착수

    const capturedKeys = new Set();
    for (const [nx, ny] of this.neighbors(x, y)) {
      if (this.board[ny][nx] === opp) {
        const info = this.groupInfo(nx, ny);
        if (info.liberties === 0) {
          for (const [sx, sy] of info.stones) capturedKeys.add(sy * this.size + sx);
        }
      }
    }

    let legal = true, reason = null;
    if (capturedKeys.size === 0) {
      // 따낸 돌이 없으면 내 그룹 활로 확인 → 0이면 자살수(금지)
      const mine = this.groupInfo(x, y);
      if (mine.liberties === 0) { legal = false; reason = 'suicide'; }
    }

    this.board[y][x] = EMPTY; // 원복

    const captured = [];
    for (const k of capturedKeys) captured.push([k % this.size, Math.floor(k / this.size)]);
    return { legal, reason, captured };
  }

  // 현재 차례 색으로 (x,y)에 착수. 성공 시 상태 갱신.
  play(x, y) {
    const color = this.turn;
    const res = this.probe(x, y, color);
    if (!res.legal) return { ok: false, reason: res.reason };

    const opp = opponent(color);
    this.board[y][x] = color;
    for (const [cx, cy] of res.captured) this.board[cy][cx] = EMPTY;

    const capCount = res.captured.length;
    this.captures[color] += capCount;

    // 패(ko) 판정: 단 한 점만 따냈고, 방금 둔 돌이 단독 1점이며 활로가 1이면
    // 따낸 자리는 다음 수로 즉시 되따낼 수 없다.
    let newKo = null;
    if (capCount === 1) {
      const mine = this.groupInfo(x, y);
      if (mine.stones.length === 1 && mine.liberties === 1) {
        newKo = { x: res.captured[0][0], y: res.captured[0][1] };
      }
    }

    this.history.push({
      type: 'move', x, y, color,
      captured: res.captured.map(([cx, cy]) => [cx, cy]),
      capColor: opp,
      prevKo: this.koPoint,
      prevPasses: this.passes,
      prevLastMove: this.lastMove,
    });
    this.moves.push({ color, x, y });

    this.koPoint = newKo;
    this.lastMove = { x, y, color };
    this.passes = 0;
    this.moveNumber++;
    this.turn = opp;
    return { ok: true, captured: capCount };
  }

  pass() {
    if (this.ended) return { ok: false, reason: 'ended' };
    const color = this.turn;
    this.history.push({
      type: 'pass', color,
      prevKo: this.koPoint, prevPasses: this.passes, prevLastMove: this.lastMove,
    });
    this.moves.push({ color, pass: true });

    this.passes++;
    this.koPoint = null;
    this.lastMove = null;
    this.turn = opponent(color);
    this.moveNumber++;
    if (this.passes >= 2) {
      this.enterScoringMode();
      return { ok: true, ended: true, scoring: true };
    }
    return { ok: true, ended: false, scoring: false };
  }

  enterScoringMode() {
    this.ended = true;
    this.deadStones.clear();
    this.result = { type: 'scoring' };
  }

  toggleDeadGroup(x, y) {
    if (!this.result || this.result.type !== 'scoring') return { ok: false };
    if (!this.inBounds(x, y) || this.board[y][x] === EMPTY) return { ok: false };
    const group = this.groupInfo(x, y);
    const keys = group.stones.map(([sx, sy]) => sy * this.size + sx);
    const remove = keys.every(key => this.deadStones.has(key));
    for (const key of keys) {
      if (remove) this.deadStones.delete(key);
      else this.deadStones.add(key);
    }
    return { ok: true, selected: !remove };
  }

  autoSelectDeadStones() {
    if (!this.result || this.result.type !== 'scoring') return { ok: false };
    const selected = new Set();
    const visited = new Set();

    for (let y = 0; y < this.size; y++) for (let x = 0; x < this.size; x++) {
      const startKey = y * this.size + x;
      const color = this.board[y][x];
      if (color === EMPTY || visited.has(startKey)) continue;

      const group = this.groupInfo(x, y);
      const liberties = new Set();
      for (const [sx, sy] of group.stones) {
        visited.add(sy * this.size + sx);
        for (const [nx, ny] of this.neighbors(sx, sy)) {
          if (this.board[ny][nx] === EMPTY) liberties.add(ny * this.size + nx);
        }
      }

      const opponentColor = opponent(color);
      const tightlySurrounded = liberties.size > 0 && liberties.size <= 2 &&
        [...liberties].every(key => {
          const lx = key % this.size, ly = Math.floor(key / this.size);
          return this.neighbors(lx, ly).some(([nx, ny]) => this.board[ny][nx] === opponentColor);
        });

      if (tightlySurrounded) {
        for (const [sx, sy] of group.stones) selected.add(sy * this.size + sx);
      }
    }

    this.deadStones = selected;
    return { ok: true, count: selected.size };
  }

  calculateScore(komi = 6.5) {
    const n = this.size;
    const board = this.board.map(row => row.slice());
    let deadBlack = 0, deadWhite = 0;
    for (const key of this.deadStones) {
      const x = key % n, y = Math.floor(key / n);
      if (board[y][x] === BLACK) deadBlack++;
      else if (board[y][x] === WHITE) deadWhite++;
      board[y][x] = EMPTY;
    }

    const visited = new Set();
    let blackTerritory = 0, whiteTerritory = 0, neutral = 0;
    for (let y = 0; y < n; y++) for (let x = 0; x < n; x++) {
      const startKey = y * n + x;
      if (board[y][x] !== EMPTY || visited.has(startKey)) continue;
      const stack = [[x, y]];
      const region = [];
      const borders = new Set();
      visited.add(startKey);
      while (stack.length) {
        const [cx, cy] = stack.pop();
        region.push([cx, cy]);
        for (const [nx, ny] of this.neighbors(cx, cy)) {
          const stone = board[ny][nx];
          if (stone === EMPTY) {
            const key = ny * n + nx;
            if (!visited.has(key)) { visited.add(key); stack.push([nx, ny]); }
          } else {
            borders.add(stone);
          }
        }
      }
      if (borders.size === 1 && borders.has(BLACK)) blackTerritory += region.length;
      else if (borders.size === 1 && borders.has(WHITE)) whiteTerritory += region.length;
      else neutral += region.length;
    }

    const blackCaptures = this.captures[BLACK] + deadWhite;
    const whiteCaptures = this.captures[WHITE] + deadBlack;
    const blackTotal = blackTerritory + blackCaptures;
    const whiteTotal = whiteTerritory + whiteCaptures + komi;
    const winner = blackTotal > whiteTotal ? BLACK : WHITE;
    return {
      blackTerritory, whiteTerritory, neutral,
      blackCaptures, whiteCaptures, deadBlack, deadWhite,
      komi, blackTotal, whiteTotal, winner,
      margin: Math.abs(blackTotal - whiteTotal),
    };
  }

  confirmScore() {
    if (!this.result || this.result.type !== 'scoring') return { ok: false };
    const score = this.calculateScore();
    this.result = { type: 'score', score };
    return { ok: true, score };
  }

  cancelScoring() {
    if (!this.result || this.result.type !== 'scoring') return { ok: false };
    this.deadStones.clear();
    this.undo();
    this.undo();
    return { ok: true };
  }

  resign(color = this.turn) {
    if (this.ended) return { ok: false };
    this.ended = true;
    this.result = { type: 'resign', loser: color, winner: opponent(color) };
    return { ok: true };
  }

  undo() {
    const last = this.history.pop();
    if (!last) return { ok: false };
    if (this.ended) { this.ended = false; this.result = null; }
    if (last.type === 'move') {
      this.board[last.y][last.x] = EMPTY;
      for (const [cx, cy] of last.captured) this.board[cy][cx] = last.capColor;
      this.captures[last.color] -= last.captured.length;
      this.turn = last.color;
      this.moveNumber--;
    } else {
      this.turn = last.color;
      this.moveNumber--;
    }
    this.koPoint = last.prevKo;
    this.passes = last.prevPasses;
    this.lastMove = last.prevLastMove;
    this.moves.pop();
    return { ok: true };
  }

  // 시뮬레이션/AI 용: 어떤 색이 둘 수 있는 모든 합법수 목록.
  legalMoves(color) {
    const out = [];
    for (let y = 0; y < this.size; y++)
      for (let x = 0; x < this.size; x++)
        if (this.board[y][x] === EMPTY) {
          const r = this.probe(x, y, color);
          if (r.legal) out.push({ x, y, captured: r.captured.length });
        }
    return out;
  }

  // (x,y)에 color로 두면 그 그룹이 갖게 될 활로 수(따냄 반영). 상태 원복.
  libertiesAfter(x, y, color) {
    const opp = opponent(color);
    this.board[y][x] = color;
    const removed = [];
    for (const [nx, ny] of this.neighbors(x, y)) {
      if (this.board[ny][nx] === opp) {
        const gi = this.groupInfo(nx, ny);
        if (gi.liberties === 0) {
          for (const [sx, sy] of gi.stones) { removed.push([sx, sy]); this.board[sy][sx] = EMPTY; }
        }
      }
    }
    const lib = this.groupInfo(x, y).liberties;
    this.board[y][x] = EMPTY;
    for (const [sx, sy] of removed) this.board[sy][sx] = opp;
    return lib;
  }

  clone() {
    const g = new GoGame(this.size);
    g.board = this.board.map(row => row.slice());
    g.turn = this.turn;
    g.captures = { [BLACK]: this.captures[BLACK], [WHITE]: this.captures[WHITE] };
    g.koPoint = this.koPoint ? { x: this.koPoint.x, y: this.koPoint.y } : null;
    g.lastMove = this.lastMove;
    g.passes = this.passes;
    g.ended = this.ended;
    g.moveNumber = this.moveNumber;
    g.handicap = this.handicap;
    return g;
  }
}


/* ===== js/board.js ===== */
// board.js — Canvas 바둑판 렌더링 및 좌표 변환

const STAR_19 = [3, 9, 15];
// 좌표 라벨: I(아이)는 건너뜀 (바둑 관례)
const LETTERS = 'ABCDEFGHJKLMNOPQRST';

class BoardView {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.size = 19;
    this.margin = 0;
    this.cell = 0;
    this.cssSize = 0;
    this.dpr = window.devicePixelRatio || 1;
  }

  // 컨테이너 크기에 맞춰 캔버스(정사각) 배치 + 셀 크기 계산
  layout(size = this.size) {
    this.size = size;
    const rect = this.canvas.getBoundingClientRect();
    const cssSize = Math.max(200, Math.floor(Math.min(rect.width, rect.height)));
    this.dpr = window.devicePixelRatio || 1;
    this.canvas.width = Math.round(cssSize * this.dpr);
    this.canvas.height = Math.round(cssSize * this.dpr);
    this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
    this.cssSize = cssSize;
    this.margin = Math.round(cssSize * 0.04) + 12; // 좌표 라벨 여백
    this.cell = (cssSize - this.margin * 2) / (size - 1);
  }

  gridToPixel(x, y) {
    return { px: this.margin + x * this.cell, py: this.margin + y * this.cell };
  }

  // 화면 좌표 → 격자 교차점. 너무 먼 클릭은 null.
  pixelToGrid(clientX, clientY) {
    const rect = this.canvas.getBoundingClientRect();
    const mx = clientX - rect.left;
    const my = clientY - rect.top;
    const x = Math.round((mx - this.margin) / this.cell);
    const y = Math.round((my - this.margin) / this.cell);
    if (x < 0 || y < 0 || x >= this.size || y >= this.size) return null;
    const gp = this.gridToPixel(x, y);
    if (Math.hypot(mx - gp.px, my - gp.py) > this.cell * 0.5) return null;
    return { x, y };
  }

  draw(game, hover, showMoveNumbers = false) {
    const ctx = this.ctx;
    const s = this.cssSize;
    ctx.clearRect(0, 0, s, s);

    // 판 배경
    ctx.fillStyle = '#e9b969';
    ctx.fillRect(0, 0, s, s);

    // 격자선
    ctx.strokeStyle = '#3a2a18';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i < this.size; i++) {
      const a = this.gridToPixel(i, 0), b = this.gridToPixel(i, this.size - 1);
      ctx.moveTo(Math.round(a.px) + 0.5, a.py); ctx.lineTo(Math.round(b.px) + 0.5, b.py);
      const c = this.gridToPixel(0, i), d = this.gridToPixel(this.size - 1, i);
      ctx.moveTo(c.px, Math.round(c.py) + 0.5); ctx.lineTo(d.px, Math.round(d.py) + 0.5);
    }
    ctx.stroke();

    // 화점
    if (this.size === 19) {
      ctx.fillStyle = '#3a2a18';
      for (const sy of STAR_19) for (const sx of STAR_19) {
        const p = this.gridToPixel(sx, sy);
        ctx.beginPath();
        ctx.arc(p.px, p.py, Math.max(2, this.cell * 0.09), 0, Math.PI * 2);
        ctx.fill();
      }
    }

    this.drawLabels(ctx);

    // 돌
    for (let y = 0; y < this.size; y++)
      for (let x = 0; x < this.size; x++)
        if (game.board[y][x] !== EMPTY) {
          const dead = game.deadStones && game.deadStones.has(y * this.size + x);
          this.drawStone(x, y, game.board[y][x], dead ? 0.48 : 1);
          if (dead) this.drawDeadMark(x, y);
        }

    // 복기 중에는 현재 판에 살아 있는 돌에 수순 번호를 표시한다.
    if (showMoveNumbers) this.drawMoveNumbers(game);

    // 호버 미리보기(빈 점일 때만)
    if (hover && game.board[hover.y][hover.x] === EMPTY && !game.ended) {
      this.drawStone(hover.x, hover.y, game.turn, 0.4);
    }

    // 마지막 착수는 대비되는 이중 원과 중심점으로 표시한다.
    if (game.lastMove) {
      const p = this.gridToPixel(game.lastMove.x, game.lastMove.y);
      const marker = game.lastMove.color === BLACK ? '#fff' : '#111';
      ctx.save();
      ctx.strokeStyle = marker;
      ctx.fillStyle = marker;
      ctx.lineWidth = Math.max(2, this.cell * 0.07);
      ctx.beginPath();
      ctx.arc(p.px, p.py, this.cell * 0.2, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(p.px, p.py, Math.max(2, this.cell * 0.055), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  drawStone(x, y, color, alpha) {
    const ctx = this.ctx;
    const p = this.gridToPixel(x, y);
    const r = this.cell * 0.46;
    ctx.save();
    ctx.globalAlpha = alpha;
    const grad = ctx.createRadialGradient(p.px - r * 0.3, p.py - r * 0.3, r * 0.1, p.px, p.py, r);
    if (color === BLACK) { grad.addColorStop(0, '#5a5a5a'); grad.addColorStop(1, '#000'); }
    else { grad.addColorStop(0, '#ffffff'); grad.addColorStop(1, '#b9b9b9'); }
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(p.px, p.py, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  drawDeadMark(x, y) {
    const ctx = this.ctx;
    const p = this.gridToPixel(x, y);
    const ring = this.cell * 0.5;
    const cross = this.cell * 0.27;
    ctx.save();
    ctx.fillStyle = 'rgba(224, 88, 107, 0.24)';
    ctx.strokeStyle = '#ff5f76';
    ctx.lineWidth = Math.max(3, this.cell * 0.1);
    ctx.beginPath();
    ctx.arc(p.px, p.py, ring, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.strokeStyle = '#fff2f4';
    ctx.lineWidth = Math.max(3, this.cell * 0.11);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(p.px - cross, p.py - cross); ctx.lineTo(p.px + cross, p.py + cross);
    ctx.moveTo(p.px + cross, p.py - cross); ctx.lineTo(p.px - cross, p.py + cross);
    ctx.stroke();
    ctx.restore();
  }

  drawMoveNumbers(game) {
    const latestAt = new Map();
    game.moves.forEach((move, index) => {
      if (!move.pass) latestAt.set(`${move.x},${move.y}`, { ...move, number: index + 1 });
    });

    const ctx = this.ctx;
    ctx.save();
    ctx.font = `700 ${Math.max(8, Math.floor(this.cell * 0.34))}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    for (const move of latestAt.values()) {
      const color = game.board[move.y][move.x];
      // 이미 잡힌 돌은 번호를 표시하지 않는다.
      if (color === EMPTY || color !== move.color) continue;
      const p = this.gridToPixel(move.x, move.y);
      ctx.fillStyle = color === BLACK ? '#fff' : '#111';
      ctx.fillText(String(move.number), p.px, p.py);
    }
    ctx.restore();
  }

  drawLabels(ctx) {
    ctx.fillStyle = '#5a4424';
    ctx.font = `${Math.max(9, Math.floor(this.cell * 0.42))}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let i = 0; i < this.size; i++) {
      const top = this.gridToPixel(i, 0);
      ctx.fillText(LETTERS[i], top.px, this.margin * 0.5);
      const left = this.gridToPixel(0, i);
      ctx.fillText(String(this.size - i), this.margin * 0.5, left.py);
    }
  }
}


/* ===== js/ai.js ===== */
// ai.js — 급수(난이도)별 AI 대전 휴리스틱 봇
// 1단계 AI는 강한 엔진이 아니라 가벼운 규칙 기반 봇이다.
//   easy   : 초급 (대략 18~13급) — 합법수 무작위 + 따냄 우선
//   medium : 중급 (대략 12~7급)  — 탐욕적 점수화(따냄/단수/자충회피/접촉)
//   hard   : 상급 (대략 6~1급)   — 중급 + 세력/근접 가중치

function chooseMove(game, color, level) {
  const engineLevel = normalizeAILevel(level);
  const strength = getAIStrength(level);
  const moves = game.legalMoves(color);
  if (moves.length === 0) return { pass: true };

  // 자기 집(eye)이나 이미 내 집처럼 굳은 작은 빈 곳은 더 강하게 제외한다.
  const nonEye = moves.filter(m => !isOwnEye(game, m.x, m.y, color));
  const nonTerritory = nonEye.filter(m => !isQuietOwnTerritoryMove(game, m, color));
  const pool = nonTerritory.length ? nonTerritory : (nonEye.length ? nonEye : moves);

  // 포석보다 즉시 포획과 단수 해소를 먼저 처리한다.
  const tacticalMove = chooseUrgentTacticalMove(game, pool, color);
  if (tacticalMove) return tacticalMove;

  // 상위 급수는 초반에 검증된 포석·정석 형태를 먼저 찾고, 없을 때 읽기 탐색으로 간다.
  if (strength.depth >= 2 && game.moveNumber < 36) {
    const bookMove = chooseOpeningBookMove(game, color);
    if (bookMove) return bookMove;
  }
  // 합법수가 남아 있어도 대국이 끝난 상태라면 패스한다.
  // 사람의 패스에는 후반이면서 급한 수가 없을 때 맞패스하고,
  // 판이 많이 찬 뒤에도 의미 없는 끝내기만 남으면 먼저 패스한다.
  if (shouldPass(game, pool, color)) return { pass: true };

  if (engineLevel === 'easy') {
    const caps = pool.filter(m => m.captured > 0);
    if (caps.length && Math.random() < 0.82) {
      const maxCapture = Math.max(...caps.map(m => m.captured));
      return pick(caps.filter(m => m.captured === maxCapture));
    }
    const rescues = pool.filter(m => savedAtariStones(game, m, color) > 0);
    if (rescues.length && Math.random() < 0.82) return pick(rescues);
    const sensible = pool.filter(m => analyzeMoveSafety(game, m, color).immediateLoss === 0);
    const safePool = sensible.length ? sensible : pool;
    if (game.moveNumber < 24) {
      const openings = safePool.filter(m => isGoodOpeningPoint(game, m));
      if (openings.length && Math.random() < 0.75) return pick(openings);
    } else {
      const related = safePool.filter(m => isMeaningfulCandidate(game, m, color));
      if (related.length && Math.random() < 0.88) return pick(related);
    }
    const active = safePool.filter(m => isMeaningfulCandidate(game, m, color));
    return pick(active.length ? active : safePool);
  }

  // 상급은 국지전뿐 아니라 전판의 후보를 비교한 뒤 읽기 탐색에 넣는다.
  const meaningful = pool.filter(m => isMeaningfulCandidate(game, m, color));
  const scoringPool = meaningful.length >= Math.min(10, pool.length) ? meaningful : pool;

  let best = [], bestScore = -Infinity;
  for (const m of scoringPool) {
    const s = scoreMove(game, m, color, engineLevel);
    if (s > bestScore) { bestScore = s; best = [m]; }
    else if (s === bestScore) best.push(m);
  }
  if (engineLevel === 'hard' && strength.depth > 1)
    return chooseMoveWithReading(game, color, scoringPool, strength);
  return pick(best);
}

function chooseUrgentTacticalMove(game, moves, color) {
  const rescues = moves
    .map(move => ({
      move,
      saved: savedAtariStones(game, move, color),
      defended: defendedWeakStones(game, move, color),
      safety: analyzeMoveSafety(game, move, color),
    }))
    .filter(item => (item.saved > 0 || item.defended >= 2) && item.safety.immediateLoss === 0);
  if (rescues.length) {
    const bestSave = Math.max(...rescues.map(item => item.saved * 4 + item.defended));
    const bestRescues = rescues.filter(item => item.saved * 4 + item.defended === bestSave);
    const maxLiberties = Math.max(...bestRescues.map(item => item.safety.liberties));
    return pick(bestRescues
      .filter(item => item.safety.liberties === maxLiberties)
      .map(item => item.move));
  }

  const captures = moves.filter(move => move.captured > 0);
  if (captures.length) {
    const maxCapture = Math.max(...captures.map(move => move.captured));
    const bestCaptures = captures.filter(move => move.captured === maxCapture);
    const safeCaptures = bestCaptures.filter(move => analyzeMoveSafety(game, move, color).immediateLoss === 0);
    return pick(safeCaptures.length ? safeCaptures : bestCaptures);
  }

  const ataris = moves
    .map(move => ({
      move,
      atari: atariStonesCreated(game, move, color),
      pressure: pressureWeakEnemyStones(game, move, color),
      safety: analyzeMoveSafety(game, move, color),
    }))
    // 단순 접촉 압박은 점수 계산에 맡기고, 긴급 전술은 실제 단수나 큰 압박만 고른다.
    .filter(item => (item.atari > 0 || item.pressure >= 4) && item.safety.immediateLoss === 0);
  if (!ataris.length) return null;
  const maxPressure = Math.max(...ataris.map(item => item.atari * 4 + item.pressure));
  return pick(ataris
    .filter(item => item.atari * 4 + item.pressure === maxPressure)
    .map(item => item.move));
}
function getAIStrength(level) {
  if (level === 'hard') return { depth: 2, beam: 8 };
  if (typeof level !== 'string') return { depth: 1, beam: 6 };
  if (level.includes('단')) return { depth: 3, beam: 14 };
  const kyu = parseInt(level, 10);
  if (kyu <= 1) return { depth: 3, beam: 12 };
  if (kyu <= 3) return { depth: 3, beam: 10 };
  if (kyu <= 6) return { depth: 2, beam: 10 };
  return { depth: 1, beam: 6 };
}

// 19줄 바둑의 간단한 포석·정석 북. 네 귀를 같은 좌표계로 바꿔 대칭 적용한다.
function chooseOpeningBookMove(game, color) {
  if (game.size !== 19) return null;
  const opp = opponent(color);
  const corners = [
    { ox: 0, oy: 0, sx: 1, sy: 1 }, { ox: 18, oy: 0, sx: -1, sy: 1 },
    { ox: 0, oy: 18, sx: 1, sy: -1 }, { ox: 18, oy: 18, sx: -1, sy: -1 },
  ];
  const at = (c, x, y) => game.board[c.oy + c.sy * y][c.ox + c.sx * x];
  const point = (c, x, y) => ({ x: c.ox + c.sx * x, y: c.oy + c.sy * y });
  const legal = move => game.probe(move.x, move.y, color).legal && !isOwnEye(game, move.x, move.y, color);

  // 화점에 걸쳐온 돌에는 반대쪽 날일자 굳힘으로 안정적으로 응수한다.
  for (const c of corners) {
    if (at(c, 3, 3) !== color) continue;
    if (at(c, 2, 5) === opp && at(c, 5, 3) === EMPTY) {
      const move = point(c, 5, 3); if (legal(move)) return move;
    }
    if (at(c, 5, 2) === opp && at(c, 3, 5) === EMPTY) {
      const move = point(c, 3, 5); if (legal(move)) return move;
    }
  }

  // 내가 걸친 뒤 상대가 굳히면 무리하게 붙지 않고 변으로 벌려 근거를 만든다.
  for (const c of corners) {
    if (at(c, 3, 3) !== opp) continue;
    if (at(c, 2, 5) === color && at(c, 5, 3) === opp && at(c, 2, 8) === EMPTY) {
      const move = point(c, 2, 8); if (legal(move)) return move;
    }
    if (at(c, 5, 2) === color && at(c, 3, 5) === opp && at(c, 8, 2) === EMPTY) {
      const move = point(c, 8, 2); if (legal(move)) return move;
    }
  }

  // 빈 귀는 화점으로 선점하되 마지막 수에서 먼 귀를 골라 한쪽만 따라다니지 않는다.
  const emptyCorners = [];
  for (const c of corners) {
    let occupied = 0;
    for (let y = 1; y <= 6; y++) for (let x = 1; x <= 6; x++)
      if (at(c, x, y) !== EMPTY) occupied++;
    const move = point(c, 3, 3);
    if (occupied === 0 && legal(move)) {
      const distance = game.lastMove ? Math.abs(move.x - game.lastMove.x) + Math.abs(move.y - game.lastMove.y) : 0;
      emptyCorners.push({ move, score: distance + Math.random() * 0.1 });
    }
  }
  if (emptyCorners.length) return emptyCorners.sort((a, b) => b.score - a.score)[0].move;

  // 상대 화점에 아직 내 돌이 없으면 낮은 걸침으로 큰 귀부터 견제한다.
  const approaches = [];
  for (const c of corners) {
    if (at(c, 3, 3) !== opp) continue;
    let mine = 0;
    for (let y = 1; y <= 7; y++) for (let x = 1; x <= 7; x++)
      if (at(c, x, y) === color) mine++;
    if (mine) continue;
    for (const [x, y] of [[2, 5], [5, 2]]) {
      const move = point(c, x, y);
      if (legal(move)) approaches.push(move);
    }
  }
  if (approaches.length) return pick(approaches);

  // 내 화점이 걸침받지 않은 귀는 날일자로 굳힌다.
  const enclosures = [];
  for (const c of corners) {
    if (at(c, 3, 3) !== color) continue;
    let enemy = 0;
    for (let y = 1; y <= 7; y++) for (let x = 1; x <= 7; x++)
      if (at(c, x, y) === opp) enemy++;
    if (enemy) continue;
    for (const [x, y] of [[5, 3], [3, 5]]) {
      const move = point(c, x, y); if (legal(move)) enclosures.push(move);
    }
  }
  return enclosures.length ? pick(enclosures) : null;
}

// 상위 급수는 내 후보, 상대 응수, 내 후속 수까지 상위 후보를 제한 탐색한다.
function chooseMoveWithReading(game, color, moves, strength) {
  const candidates = rankedAIMoves(game, color, strength.beam, moves);
  let best = [], bestValue = -Infinity;
  for (const candidate of candidates) {
    const afterMine = game.clone();
    if (!afterMine.play(candidate.move.x, candidate.move.y).ok) continue;
    const replies = rankedAIMoves(afterMine, opponent(color), Math.max(5, strength.beam - 3));
    let replyCost = 0, continuation = 0;
    if (replies.length) {
      replyCost = replies[0].score;
      if (strength.depth >= 3) {
        const afterReply = afterMine.clone();
        if (afterReply.play(replies[0].move.x, replies[0].move.y).ok) {
          const followUps = rankedAIMoves(afterReply, color, Math.max(4, strength.beam - 5));
          if (followUps.length) continuation = followUps[0].score;
        }
      }
    }
    const value = candidate.score - replyCost * 0.78 + continuation * 0.46;
    if (value > bestValue + 0.01) { bestValue = value; best = [candidate.move]; }
    else if (Math.abs(value - bestValue) <= 0.01) best.push(candidate.move);
  }
  return pick(best.length ? best : candidates.map(item => item.move));
}

function rankedAIMoves(game, color, limit, sourceMoves = null) {
  const moves = sourceMoves || game.legalMoves(color).filter(m => !isOwnEye(game, m.x, m.y, color));
  return moves.map(move => ({ move, score: scoreMove(game, move, color, 'hard') }))
    .sort((a, b) => b.score - a.score).slice(0, limit);
}
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function shouldPass(game, moves, color) {
  const total = game.size * game.size;
  let occupied = 0;
  for (const row of game.board)
    for (const point of row)
      if (point !== EMPTY) occupied++;

  const progress = occupied / total;
  const urgent = moves.some(m => isUrgentMove(game, m, color));

  // 최소 90개 정도의 돌이 놓인 후, 사람이 패스했고 급한 수가 없으면 종료에 동의.
  const enoughPlayed = occupied >= Math.max(60, Math.floor(total * 0.25));
  if (game.passes === 1 && enoughPlayed && !urgent) return true;

  // 사람이 패스하지 않아도 판의 62% 이상이 찼고 급한 수가 없으면 먼저 패스.
  return progress >= 0.62 && !urgent;
}

function isUrgentMove(game, move, color) {
  if (move.captured > 0) return true;

  // 단수에 몰린 내 돌을 살리는 수는 패스하지 않고 둔다.
  for (const [nx, ny] of game.neighbors(move.x, move.y)) {
    if (game.board[ny][nx] === color && game.groupInfo(nx, ny).liberties === 1)
      return true;
  }
  return false;
}

// 이 수로 단수 상태에서 빠져나오는 내 돌의 수.
function savedAtariStones(game, move, color) {
  const counted = new Set();
  let saved = 0;
  for (const [nx, ny] of game.neighbors(move.x, move.y)) {
    if (game.board[ny][nx] !== color) continue;
    const group = game.groupInfo(nx, ny);
    if (group.liberties !== 1) continue;
    const key = group.stones.map(([x, y]) => y * game.size + x).sort((a, b) => a - b)[0];
    if (!counted.has(key)) {
      counted.add(key);
      saved += group.stones.length;
    }
  }
  return saved;
}

// 활로가 2개뿐인 내 약한 돌을 잇거나 숨통을 넓히는 정도.
function defendedWeakStones(game, move, color) {
  const before = new Map();
  for (const [nx, ny] of game.neighbors(move.x, move.y)) {
    if (game.board[ny][nx] !== color) continue;
    const group = game.groupInfo(nx, ny);
    if (group.liberties > 2) continue;
    before.set(groupKey(game, group), group);
  }
  if (!before.size) return 0;

  const result = game.probe(move.x, move.y, color);
  if (!result.legal) return 0;
  const opp = opponent(color);
  game.board[move.y][move.x] = color;
  for (const [x, y] of result.captured) game.board[y][x] = EMPTY;

  let defended = 0;
  const after = game.groupInfo(move.x, move.y);
  for (const group of before.values()) {
    if (after.liberties > group.liberties)
      defended += group.stones.length * (3 - group.liberties);
  }

  game.board[move.y][move.x] = EMPTY;
  for (const [x, y] of result.captured) game.board[y][x] = opp;
  return defended;
}

// 착수 직후 활로와 상대의 즉시 포획 가능성을 한 수만 시험한다.
function analyzeMoveSafety(game, move, color) {
  const result = game.probe(move.x, move.y, color);
  if (!result.legal) return { liberties: 0, immediateLoss: 999 };

  const opp = opponent(color);
  game.board[move.y][move.x] = color;
  for (const [x, y] of result.captured) game.board[y][x] = EMPTY;

  const mine = game.groupInfo(move.x, move.y);
  let immediateLoss = 0;
  if (mine.liberties === 1) {
    const liberties = new Map();
    for (const [sx, sy] of mine.stones) {
      for (const [nx, ny] of game.neighbors(sx, sy)) {
        if (game.board[ny][nx] === EMPTY) liberties.set(`${nx},${ny}`, [nx, ny]);
      }
    }
    const liberty = liberties.values().next().value;
    if (liberty) {
      const reply = game.probe(liberty[0], liberty[1], opp);
      if (reply.legal && reply.captured.length >= mine.stones.length)
        immediateLoss = mine.stones.length;
    }
  }

  game.board[move.y][move.x] = EMPTY;
  for (const [x, y] of result.captured) game.board[y][x] = opp;
  return { liberties: mine.liberties, immediateLoss };
}

function nearbyStoneCount(game, x, y, radius) {
  let count = 0;
  for (let ny = Math.max(0, y - radius); ny <= Math.min(game.size - 1, y + radius); ny++)
    for (let nx = Math.max(0, x - radius); nx <= Math.min(game.size - 1, x + radius); nx++)
      if (Math.abs(nx - x) + Math.abs(ny - y) <= radius && game.board[ny][nx] !== EMPTY)
        count++;
  return count;
}

function nearbyColorCount(game, x, y, radius, color) {
  let count = 0;
  for (let ny = Math.max(0, y - radius); ny <= Math.min(game.size - 1, y + radius); ny++)
    for (let nx = Math.max(0, x - radius); nx <= Math.min(game.size - 1, x + radius); nx++)
      if (Math.abs(nx - x) + Math.abs(ny - y) <= radius && game.board[ny][nx] === color) count++;
  return count;
}

// 착수점이 내 돌로만 둘러싸인 작은 빈 영역인지 확인한다.
function isLikelyOwnTerritory(game, x, y, color, maxRegion = 12) {
  if (game.board[y][x] !== EMPTY) return false;
  const seen = new Set([y * game.size + x]);
  const stack = [[x, y]];
  let touchesOwn = false;

  while (stack.length) {
    const [cx, cy] = stack.pop();
    if (seen.size > maxRegion) return false;
    for (const [nx, ny] of game.neighbors(cx, cy)) {
      const stone = game.board[ny][nx];
      if (stone === EMPTY) {
        const key = ny * game.size + nx;
        if (!seen.has(key)) { seen.add(key); stack.push([nx, ny]); }
      } else if (stone === color) {
        touchesOwn = true;
      } else {
        return false;
      }
    }
  }
  return touchesOwn;
}

// 이 수로 새로 단수가 되는 상대 돌 수를 센다.
function atariStonesCreated(game, move, color) {
  const result = game.probe(move.x, move.y, color);
  if (!result.legal) return 0;
  const opp = opponent(color);
  game.board[move.y][move.x] = color;
  for (const [x, y] of result.captured) game.board[y][x] = EMPTY;

  const counted = new Set();
  let stones = 0;
  for (const [nx, ny] of game.neighbors(move.x, move.y)) {
    if (game.board[ny][nx] !== opp) continue;
    const group = game.groupInfo(nx, ny);
    const key = groupKey(game, group);
    if (group.liberties === 1 && !counted.has(key)) {
      counted.add(key);
      stones += group.stones.length;
    }
  }

  game.board[move.y][move.x] = EMPTY;
  for (const [x, y] of result.captured) game.board[y][x] = opp;
  return stones;
}

// 상대 약한 그룹에 붙거나 기대어 활로를 줄이는 압박 가치.
function pressureWeakEnemyStones(game, move, color) {
  const result = game.probe(move.x, move.y, color);
  if (!result.legal) return 0;
  const opp = opponent(color);
  game.board[move.y][move.x] = color;
  for (const [x, y] of result.captured) game.board[y][x] = EMPTY;

  const counted = new Set();
  let pressure = 0;
  for (const [nx, ny] of game.neighbors(move.x, move.y)) {
    if (game.board[ny][nx] !== opp) continue;
    const group = game.groupInfo(nx, ny);
    const key = groupKey(game, group);
    if (counted.has(key)) continue;
    counted.add(key);
    if (group.liberties === 1) pressure += group.stones.length * 4;
    else if (group.liberties === 2) pressure += group.stones.length * 2;
    else if (group.liberties === 3) pressure += group.stones.length;
  }

  game.board[move.y][move.x] = EMPTY;
  for (const [x, y] of result.captured) game.board[y][x] = opp;
  return pressure;
}

function groupKey(game, group) {
  return group.stones
    .map(([x, y]) => y * game.size + x)
    .sort((a, b) => a - b)[0];
}

function adjacentGroupStats(game, move, color) {
  const ownGroups = new Set();
  const oppGroups = new Set();
  let ownNeighbors = 0, oppNeighbors = 0;
  const opp = opponent(color);
  for (const [nx, ny] of game.neighbors(move.x, move.y)) {
    const stone = game.board[ny][nx];
    if (stone === color) {
      ownNeighbors++;
      ownGroups.add(groupKey(game, game.groupInfo(nx, ny)));
    } else if (stone === opp) {
      oppNeighbors++;
      oppGroups.add(groupKey(game, game.groupInfo(nx, ny)));
    }
  }
  return {
    ownNeighbors,
    oppNeighbors,
    ownGroups: ownGroups.size,
    oppGroups: oppGroups.size,
  };
}

function isGoodOpeningPoint(game, move) {
  const dx = Math.min(move.x, game.size - 1 - move.x);
  const dy = Math.min(move.y, game.size - 1 - move.y);
  return dx >= 2 && dx <= 4 && dy >= 2 && dy <= 4;
}

function isMeaningfulCandidate(game, move, color) {
  if (move.captured > 0 || savedAtariStones(game, move, color) > 0) return true;
  if (defendedWeakStones(game, move, color) > 0) return true;
  if (atariStonesCreated(game, move, color) > 0 || pressureWeakEnemyStones(game, move, color) > 0) return true;
  const groups = adjacentGroupStats(game, move, color);
  if (groups.oppNeighbors > 0 || groups.ownGroups >= 2 || groups.oppGroups >= 2) return true;
  if (game.lastMove) {
    const d = Math.abs(game.lastMove.x - move.x) + Math.abs(game.lastMove.y - move.y);
    if (d <= 3) return true;
  }
  if (game.moveNumber < 24 && isGoodOpeningPoint(game, move)) return true;
  return nearbyStoneCount(game, move.x, move.y, 2) > 0;
}

function scoreMove(game, m, color, level) {
  let s = 0;
  const opp = opponent(color);

  // 1단계 핵심: 즉시 포획과 단수 해소는 다른 일반 행마보다 확실히 우선한다.
  s += m.captured * 100;
  const rescued = savedAtariStones(game, m, color);
  const defended = defendedWeakStones(game, m, color);
  const atariCreated = atariStonesCreated(game, m, color);
  const pressure = pressureWeakEnemyStones(game, m, color);
  s += rescued * 120;
  s += defended * 28;
  s += atariCreated * 34;
  s += pressure * 12;

  // 착수 직후 잡히는 수와 활로 하나뿐인 무리한 수는 후보에서 밀어낸다.
  const safety = analyzeMoveSafety(game, m, color);
  const myLib = safety.liberties;
  if (myLib <= 1 && m.captured === 0) s -= 120;
  if (safety.immediateLoss > 0) s -= safety.immediateLoss * 120;
  s += Math.min(myLib, 4);

  const groups = adjacentGroupStats(game, m, color);
  if (groups.ownGroups >= 2) s += (groups.ownGroups - 1) * 12; // 내 돌 연결
  if (groups.oppGroups >= 2) s += (groups.oppGroups - 1) * 12; // 상대 돌 사이 끊기
  s += groups.oppNeighbors * 16;                               // 상대 돌 근처의 의미 있는 응수

  // 내 돌로만 거의 둘러싸인 자리는 집이 아니더라도 대개 가치가 낮다.
  if (groups.ownNeighbors >= 3 && groups.oppNeighbors === 0 && rescued === 0 && defended === 0) s -= 48;

  // 주변 분석
  for (const [nx, ny] of game.neighbors(m.x, m.y)) {
    const v = game.board[ny][nx];
    if (v === opp) {
      const gi = game.groupInfo(nx, ny);
      if (gi.liberties === 1) s += 115;      // 즉시 포획 가능한 그룹
      else if (gi.liberties === 2) s += 26; // 단수·압박으로 이어지는 접촉
      else if (gi.liberties === 3) s += 8;
    } else if (v === color) {
      const gi = game.groupInfo(nx, ny);
      if (gi.liberties === 1) s += 110;      // 단수당한 내 그룹 잇기/살리기
      else if (gi.liberties === 2) s += 24;
    }
  }

  // 상대 마지막 수 근처(접촉/응수)
  if (game.lastMove) {
    const d = Math.abs(game.lastMove.x - m.x) + Math.abs(game.lastMove.y - m.y);
    if (d === 1) s += level === 'hard' ? 4 : 7;
    else if (d === 2) s += level === 'hard' ? 2.5 : 5;
    else if (d === 3) s += level === 'hard' ? 1 : 2;
  }

  // 의미 없는 1~2선 착수와 중후반의 동떨어진 빈 공간 착수를 줄인다.
  const edge = Math.min(m.x, m.y, game.size - 1 - m.x, game.size - 1 - m.y);
  if (edge === 0) s -= 7;
  else if (edge === 1) s -= 2.5;
  else if (game.moveNumber < 50 && edge <= 4) s += level === 'hard' ? 2 : 1;
  if (edge <= 1 && myLib <= 2 && m.captured === 0 && rescued === 0) s -= 28;

  if (game.moveNumber < 24) {
    if (isGoodOpeningPoint(game, m)) s += level === 'hard' ? 6 : 3;
    else if (nearbyStoneCount(game, m.x, m.y, 3) === 0) s -= level === 'hard' ? 6 : 3;
  }

  const nearby2 = nearbyStoneCount(game, m.x, m.y, 2);
  const nearby3 = nearbyStoneCount(game, m.x, m.y, 3);
  if (game.moveNumber >= 20 && nearby3 === 0) s -= level === 'hard' ? 24 : 16;
  if (game.moveNumber >= 32 && nearby2 === 0 && m.captured === 0 && rescued === 0 && atariCreated === 0)
    s -= level === 'hard' ? 18 : 12;
  if (nearby2 > 0) s += Math.min(nearby2, 4) * (level === 'hard' ? 1.1 : 0.9);

  // 초중반에는 한쪽 과밀을 피하고 아직 비어 있는 전장으로 행마한다.
  const ownNearby = nearbyColorCount(game, m.x, m.y, 4, color);
  const oppNearby = nearbyColorCount(game, m.x, m.y, 4, opp);
  if (isLikelyOwnTerritory(game, m.x, m.y, color, 20)) s -= (rescued > 0 || defended > 0) ? 45 : 150;
  if (isQuietOwnTerritoryMove(game, m, color)) s -= 90;
  if (ownNearby >= 6 && oppNearby === 0 && m.captured === 0 && rescued === 0)
    s -= 32 + (ownNearby - 6) * 5;
  if (game.moveNumber < 55 && level === 'hard') {
    if (ownNearby === 0 && edge >= 2 && edge <= 5) s += 5;
    if (ownNearby >= 5) s -= (ownNearby - 4) * 2.4;
    if (nearby2 >= 6 && m.captured === 0) s -= (nearby2 - 5) * 2;
  }

  return s;
}

function isQuietOwnTerritoryMove(game, move, color) {
  if (move.captured > 0 || savedAtariStones(game, move, color) > 0) return false;
  if (defendedWeakStones(game, move, color) > 0) return false;
  const groups = adjacentGroupStats(game, move, color);
  if (groups.oppNeighbors > 0 || pressureWeakEnemyStones(game, move, color) > 0) return false;
  return isLikelyOwnTerritory(game, move.x, move.y, color, 20);
}

// (x,y)가 color의 "진짜 집(eye)"인지: 직교 이웃이 모두 내 색(또는 판 끝),
// 대각도 충분히 내 색이면 집으로 보고 메우지 않는다.
function isOwnEye(game, x, y, color) {
  for (const [nx, ny] of game.neighbors(x, y)) {
    if (game.board[ny][nx] !== color) return false;
  }
  const diag = [[x - 1, y - 1], [x + 1, y - 1], [x - 1, y + 1], [x + 1, y + 1]];
  let ownDiag = 0, total = 0, edge = false;
  for (const [dx, dy] of diag) {
    if (!game.inBounds(dx, dy)) { edge = true; continue; }
    total++;
    if (game.board[dy][dx] === color) ownDiag++;
  }
  // 변/귀에서는 존재하는 대각이 모두 내 색이어야, 중앙에서는 3개 이상이면 집
  if (edge) return ownDiag === total;
  return ownDiag >= 3;
}

// record.js — 기보(수순) 기록: SGF/JSON 내보내기, localStorage 저장/불러오기

const STORE_KEY = 'baduk_kifu_v1';

function esc(s) { return String(s).replace(/[\]\\]/g, '\\$&'); }

// 수순 배열 → SGF 문자열. 좌표는 a..s (0..18), y는 위에서 아래로.
function movesToSGF(moves, size, meta = {}) {
  const col = c => (c === BLACK ? 'B' : 'W');
  const coord = (x, y) => String.fromCharCode(97 + x) + String.fromCharCode(97 + y);
  let sgf = `(;GM[1]FF[4]CA[UTF-8]SZ[${size}]`;
  if (meta.handicap) sgf += `HA[${meta.handicap}]`;
  if (meta.pb) sgf += `PB[${esc(meta.pb)}]`;
  if (meta.pw) sgf += `PW[${esc(meta.pw)}]`;
  if (meta.date) sgf += `DT[${esc(meta.date)}]`;
  if (meta.result) sgf += `RE[${esc(meta.result)}]`;
  for (const m of moves) {
    if (m.pass) sgf += `;${col(m.color)}[]`;
    else sgf += `;${col(m.color)}[${coord(m.x, m.y)}]`;
  }
  sgf += ')';
  return sgf;
}

function gameToJSON(game, meta = {}) {
  return JSON.stringify({
    size: game.size,
    handicap: game.handicap,
    moves: game.moves,
    meta,
  }, null, 2);
}

function listSaved() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); }
  catch { return []; }
}

function saveKifu(name, game, meta = {}) {
  const list = listSaved();
  const entry = {
    name: name || ('대국 ' + (list.length + 1)),
    size: game.size,
    handicap: game.handicap,
    moves: game.moves.slice(),
    meta,
  };
  list.unshift(entry);
  localStorage.setItem(STORE_KEY, JSON.stringify(list.slice(0, 50)));
  return entry;
}

function deleteKifu(index) {
  const list = listSaved();
  if (index < 0 || index >= list.length) return;
  list.splice(index, 1);
  localStorage.setItem(STORE_KEY, JSON.stringify(list));
}

// 브라우저에서 파일 다운로드
function download(filename, text, mime = 'text/plain') {
  const blob = new Blob([text], { type: mime + ';charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// game.js — 게임 컨트롤러: 모드(2인 로컬/AI), AI 스케줄링, 기보 복기(review)
// DOM은 다루지 않는다. 상태 변화는 onChange 콜백으로 알린다.

class GameController {
  constructor() {
    this.game = new GoGame(19);
    this.mode = 'local';        // 'local' | 'ai' | 'online'
    this.aiLevel = 'medium';
    this.humanColor = BLACK;
    this.aiColor = WHITE;
    this.thinking = false;
    this.awaitingPassChoice = false;
    this.aiRequestId = 0;
    this.onChange = () => {};

    // 복기(review) 상태
    this.reviewMode = false;
    this.reviewMoves = [];
    this.reviewHandicap = 0;
    this.reviewSize = 19;
    this.reviewIndex = 0;
  }

  newGame(opts = {}) {
    this.mode = opts.mode || 'local';
    this.aiLevel = opts.aiLevel || 'medium';
    this.reviewMode = false;
    this.thinking = false;
    this.awaitingPassChoice = false;
    this.aiRequestId++;

    this.game = new GoGame(19);
    const h = opts.handicap || 0;
    if (h >= 2) this.game.setupHandicap(h);

    if (this.mode === 'ai') {
      this.humanColor = BLACK;          // 1단계: 사람은 항상 흑
      this.aiColor = WHITE;
    }
    this.emit();
    this.maybeAI(); // 접바둑 등으로 AI(백)가 먼저 둘 수 있음
  }

  humanPlay(x, y) {
    if (this.reviewMode || this.thinking || this.awaitingPassChoice) return;
    if (this.mode === 'online') return { ok: false, reason: 'online-play-disabled' };
    if (this.game.result && this.game.result.type === 'scoring') {
      const result = this.game.toggleDeadGroup(x, y);
      if (result.ok) this.emit();
      return result;
    }
    if (this.game.ended) return;
    if (this.mode === 'ai' && this.game.turn !== this.humanColor) return;
    const r = this.game.play(x, y);
    if (!r.ok) return r;
    this.emit();
    this.maybeAI();
    return r;
  }

  pass() {
    if (this.reviewMode || this.thinking || this.awaitingPassChoice || this.game.ended) return;
    if (this.mode === 'online') return;
    if (this.mode === 'ai' && this.game.turn !== this.humanColor) return;
    const result = this.game.pass();

    // 사용자 선택 전까지 AI 착수와 계가 진입을 보류한다.
    if (this.mode === 'ai' && result && result.ok && !result.scoring &&
        this.game.turn === this.aiColor) {
      this.aiRequestId++;
      this.thinking = false;
      this.awaitingPassChoice = true;
      this.emit();
      return;
    }

    this.emit();
    if (result && result.scoring) return;
    this.maybeAI();
  }

  confirmPassScoring() {
    if (!this.awaitingPassChoice || this.mode !== 'ai' || this.game.ended ||
        this.game.turn !== this.aiColor) return;
    this.awaitingPassChoice = false;
    this.aiRequestId++;
    const result = this.game.pass();
    this.thinking = false;
    this.emit();
    return result;
  }

  continueAfterPass() {
    if (!this.awaitingPassChoice || this.mode !== 'ai' || this.game.ended ||
        this.game.turn !== this.aiColor) return;
    this.awaitingPassChoice = false;
    this.emit();
    this.maybeAI();
    return { ok: true };
  }

  resign() {
    if (this.reviewMode || this.game.ended) return;
    if (this.mode === 'online') return;
    this.awaitingPassChoice = false;
    // AI 대전이면 사람(흑)이 기권. 로컬이면 현재 차례가 기권.
    const loser = this.mode === 'ai' ? this.humanColor : this.game.turn;
    this.game.resign(loser);
    this.emit();
  }

  confirmScore() {
    if (this.reviewMode) return;
    const result = this.game.confirmScore();
    if (result.ok) this.emit();
  }

  autoSelectDeadStones() {
    if (this.reviewMode) return;
    const result = this.game.autoSelectDeadStones();
    if (result.ok) this.emit();
    return result;
  }

  cancelScoring() {
    if (this.reviewMode) return;
    const result = this.game.cancelScoring();
    if (result.ok) this.emit();
  }

  undo() {
    if (this.reviewMode || this.thinking) return;
    if (this.mode === 'online') return;
    this.game.undo();
    // AI 대전: AI 수 + 사람 수를 함께 되돌려 사람 차례로 복귀
    if (this.mode === 'ai' && this.game.turn === this.aiColor && this.game.history.length) {
      this.game.undo();
    }
    this.emit();
  }

  maybeAI() {
    if (this.mode !== 'ai' || this.game.ended || this.awaitingPassChoice) return;
    if (this.game.turn !== this.aiColor) return;
    const requestId = ++this.aiRequestId;
    const scheduledGame = this.game;
    this.thinking = true;
    this.emit();
    // 약간의 지연으로 "생각하는" 느낌 + UI 갱신 보장
    setTimeout(() => {
      // 새 대국·계가 진입·턴 변경 뒤에는 예약된 AI 착수를 폐기한다.
      const cancelled = requestId !== this.aiRequestId ||
        this.game !== scheduledGame || this.mode !== 'ai' ||
        scheduledGame.ended || scheduledGame.turn !== this.aiColor;
      if (cancelled) {
        this.thinking = false;
        this.emit();
        return;
      }

      const mv = chooseMove(scheduledGame, this.aiColor, this.aiLevel);
      if (mv.pass) scheduledGame.pass();
      else scheduledGame.play(mv.x, mv.y); // 정상 착수는 passes를 0으로 초기화
      this.thinking = false;
      this.emit();
    }, 350);
  }

  // ----- 기보 복기 -----
  loadKifu(kifu) {
    this.reviewMode = true;
    this.mode = 'local';
    this.thinking = false;
    this.awaitingPassChoice = false;
    this.reviewMoves = (kifu.moves || []).slice();
    this.reviewHandicap = kifu.handicap || 0;
    this.reviewSize = kifu.size || 19;
    this.reviewIndex = this.reviewMoves.length;
    this.rebuildReview();
  }

  rebuildReview() {
    const g = new GoGame(this.reviewSize);
    if (this.reviewHandicap >= 2) g.setupHandicap(this.reviewHandicap);
    for (let i = 0; i < this.reviewIndex; i++) {
      const m = this.reviewMoves[i];
      if (m.pass) g.pass();
      else g.play(m.x, m.y);
    }
    this.game = g;
    this.emit();
  }

  reviewStep(target) {
    if (!this.reviewMode) return;
    const n = this.reviewMoves.length;
    if (target === 'first') this.reviewIndex = 0;
    else if (target === 'last') this.reviewIndex = n;
    else if (target === 'prev') this.reviewIndex = Math.max(0, this.reviewIndex - 1);
    else if (target === 'next') this.reviewIndex = Math.min(n, this.reviewIndex + 1);
    this.rebuildReview();
  }

  // 현재 복기 위치부터 이어서 대국 (이후 수는 버림)
  continueFromReview() {
    if (!this.reviewMode) return;
    this.reviewMode = false;
    this.mode = 'local';
    this.emit();
  }

  emit() { this.onChange(this.state()); }

  state() {
    const g = this.game;
    return {
      board: g.board,
      size: g.size,
      turn: g.turn,
      captures: g.captures,
      lastMove: g.lastMove,
      moveNumber: g.moveNumber,
      ended: g.ended,
      result: g.result,
      passes: g.passes,
      thinking: this.thinking,
      awaitingPassChoice: this.awaitingPassChoice,
      mode: this.mode,
      reviewMode: this.reviewMode,
      reviewIndex: this.reviewIndex,
      reviewTotal: this.reviewMoves.length,
      scoringMode: !this.reviewMode && !!(g.result && g.result.type === 'scoring'),
      score: g.result && g.result.type === 'scoring' ? g.calculateScore() :
        (g.result && g.result.type === 'score' ? g.result.score : null),
    };
  }
}
